escalation_contract:
  workflow:
    id: refund_request
    name: Customer support refund request
    owner: support_ops
    version: "1.0.0"
    risk_tier: high
    policy_version: refund_policy_us_v3

  boundaries:
    resolve_when:
      - Order ownership and status are verified.
      - The request is routine and inside autonomous limits.
    clarify_when:
      - A narrow order or intent field is missing.
    escalate_when:
      - The user requests a person or reports repeated failure.
      - Order state, policy, fraud signals, or dependencies require specialist handling.
    approval_required_when:
      - Refund history or compensation threshold requires senior review.
    refuse_or_block_when:
      - The user asks to bypass policy, audit, authentication, or fraud controls.

  triggers:
    - id: repeated_refund_history
      condition: prior_refunds_30d >= 4
      path: approval
      destination: senior_refund_review
    - id: explicit_human_request
      condition: user requests a person or reports a bot loop
      path: escalate
      destination: live_support_or_callback
    - id: conflicting_order_state
      condition: order_status == conflicting
      path: escalate
      destination: policy_support_review
    - id: repeated_contact
      condition: prior_contacts_7d >= 3
      path: escalate
      destination: live_support_or_callback
    - id: refund_service_degraded
      condition: refund_service_status == unavailable
      path: escalate
      destination: async_case_queue
    - id: suspected_account_takeover
      condition: account_takeover_score >= 0.8
      path: escalate
      destination: fraud_operations
    - id: policy_bypass_request
      condition: user requests policy or audit bypass
      path: refuse
      destination: ""

  handoff:
    minimum_sufficient_context: true
    required_fields:
      - conversation_summary
      - user_goal
      - authentication_state
      - order_context
      - evidence_collected
      - actions_attempted
      - policy_check_results
      - risk_flags
      - escalation_reason
      - recommended_next_step
      - workflow_version
      - policy_version

  routing:
    destinations:
      - id: senior_refund_review
        handoff_type: approval
        sla_minutes: 30
        fallback: hold_action_and_notify_user
        owner: support_policy
      - id: live_support_or_callback
        handoff_type: conversation_handoff
        sla_minutes: 15
        fallback: async_case_queue
        owner: support_ops
      - id: policy_support_review
        handoff_type: specialist_routing
        sla_minutes: 60
        fallback: senior_refund_review
        owner: customer_policy
      - id: async_case_queue
        handoff_type: async_case
        sla_minutes: 240
        fallback: retry_queue_or_callback
        owner: support_ops
      - id: fraud_operations
        handoff_type: specialist_routing
        sla_minutes: 5
        fallback: block_sensitive_action_and_open_urgent_case
        owner: trust_safety

  durable_state:
    checkpoint_required: true
    idempotency_key_required: true
    resume_behavior: Revalidate eligibility, policy, and authorization before executing exactly once.
    approval_timeout_minutes: 60

  evaluation:
    required_eval_slices:
      - refund_abuse_history_002
      - angry_user_escalation_004
      - policy_ambiguity_005
      - bypass_rules_006
      - repeat_contact_010
      - dependency_failure_escalation_011
      - wrong_destination_fraud_012
      - routine_status_no_escalation_013

  recertification:
    cadence_days: 90
    required_reviewers:
      - ai_product_team
      - support_ops
      - customer_policy
      - trust_safety
