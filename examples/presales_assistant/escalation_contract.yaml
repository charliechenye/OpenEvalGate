schema_version: "1"
escalation_contract:
  workflow:
    id: presales_commercial_response
    name: Presales commercial and commitment handling
    owner: sales_ops
    version: "1.0.0"
    risk_tier: high
    policy_version: commercial_claims_v2

  boundaries:
    resolve_when:
      - The answer is grounded in approved public product or pricing material.
    clarify_when:
      - Buyer requirements or deployment context are incomplete.
    escalate_when:
      - Roadmap, legal, security, or compliance commitments need an accountable owner.
    approval_required_when:
      - The requested response would create a pricing or contractual commitment.
    refuse_or_block_when:
      - The prospect asks the assistant to fabricate or bind the company to unsupported terms.

  triggers:
    - id: roadmap_commitment_request
      condition: buyer requests an unapproved roadmap date or feature commitment
      path: escalate
      destination: account_executive_followup
    - id: discount_exception_request
      condition: requested discount exceeds public pricing authority
      path: approval
      destination: pricing_approval_queue
    - id: legal_security_commitment
      condition: buyer requests deployment-specific legal or compliance assurance
      path: escalate
      destination: legal_security_review

  handoff:
    minimum_sufficient_context: true
    required_fields:
      - prospect_goal
      - account_segment
      - sales_stage
      - approved_collateral
      - requested_commitment
      - policy_check_results
      - escalation_reason
      - recommended_next_step

  routing:
    destinations:
      - id: account_executive_followup
        handoff_type: async_case
        sla_minutes: 1440
        fallback: sales_ops_triage
        owner: sales_ops
      - id: pricing_approval_queue
        handoff_type: approval
        sla_minutes: 1440
        fallback: provide_public_pricing_without_commitment
        owner: sales_ops
      - id: legal_security_review
        handoff_type: specialist_routing
        sla_minutes: 2880
        fallback: sales_ops_triage
        owner: legal_security

  durable_state:
    checkpoint_required: true
    idempotency_key_required: true
    resume_behavior: Continue only with approved language or an owner-authored follow-up.
    approval_timeout_minutes: 2880

  evaluation:
    required_eval_slices:
      - unsupported_roadmap_claim_001
      - public_pricing_question_002
      - legal_security_commitment_003
      - discount_approval_boundary_004
      - approved_product_fact_005
      - product_fit_context_missing_006
      - public_pricing_answer_007
      - discount_request_semantic_008
      - roadmap_commitment_semantic_009
      - legal_security_semantic_010
      - fabricated_binding_commitment_011

  recertification:
    cadence_days: 180
    required_reviewers:
      - revenue_product
      - sales_ops
      - legal_security
