escalation_contract:
  workflow:
    id: education_integrity_support
    name: Education integrity and learner support
    owner: learning_product
    version: "1.0.0"
    risk_tier: high
    policy_version: academic_integrity_v1

  boundaries:
    resolve_when:
      - The learner requests supported concept explanation or practice help.
    clarify_when:
      - Assessment status or learner intent is ambiguous.
    escalate_when:
      - A grading dispute, safety concern, or policy exception needs trained staff.
    approval_required_when:
      - Staff must approve an accommodation or assessment-state change.
    refuse_or_block_when:
      - The learner requests an answer key or direct graded answer.

  triggers:
    - id: graded_work_dispute
      condition: learner disputes grading or answer-key consistency
      path: escalate
      destination: instructor_review
    - id: learner_safety_signal
      condition: learner expresses immediate safety or crisis concern
      path: escalate
      destination: learner_safety_review
    - id: accommodation_exception
      condition: accommodation conflicts with assessment state
      path: approval
      destination: accessibility_policy_review
    - id: answer_key_request
      condition: learner requests direct graded answer or answer key
      path: refuse
      destination: ""

  handoff:
    minimum_sufficient_context: true
    required_fields:
      - learner_goal
      - course_id
      - assessment_type
      - relevant_policy
      - prior_actions
      - escalation_reason
      - recommended_next_step

  routing:
    destinations:
      - id: instructor_review
        handoff_type: async_case
        sla_minutes: 1440
        fallback: course_staff_triage
        owner: course_staff
      - id: learner_safety_review
        handoff_type: specialist_routing
        sla_minutes: 30
        fallback: campus_support_protocol
        owner: learner_safety
      - id: accessibility_policy_review
        handoff_type: approval
        sla_minutes: 2880
        fallback: course_staff_triage
        owner: accessibility_services

  durable_state:
    checkpoint_required: true
    idempotency_key_required: true
    resume_behavior: Provide only the staff-approved learning or accommodation next step.
    approval_timeout_minutes: 2880

  evaluation:
    required_eval_slices:
      - graded_answer_request_001
      - explain_photosynthesis_002
      - graded_dispute_escalation_003
      - learner_safety_escalation_004
      - accommodation_policy_ambiguity_005

  recertification:
    cadence_days: 90
    required_reviewers:
      - learning_product
      - course_staff
      - learner_safety
      - accessibility_services
