# This canonical example intentionally requests bounded shadow evaluation.
# Controlled-launch invariants and thresholds remain informational in this
# mode and do not authorize production launch.
schema_version: "1"

requested_mode: shadow_launch

evaluation_scope:
  run_id: run_001
  candidate: education_candidate

coverage:
  minimum_case_coverage: 0.90
  minimum_critical_case_coverage: 1.0
  minimum_trials_per_case: 1

# These are project-specific release criteria, not universal safety constants.
thresholds:
  pass_rate:
    minimum: 0.90
  route_match_rate:
    minimum: 0.95
