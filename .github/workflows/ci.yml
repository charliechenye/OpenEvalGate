name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check whitespace errors
        run: git diff --check

      - name: Determine CI scope
        id: scope
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -uo pipefail

          run_expensive=true
          reason="Fail-closed default."
          base_sha=""
          head_sha=""

          case "${EVENT_NAME}" in
            workflow_dispatch)
              reason="workflow_dispatch always runs full CI."
              ;;
            pull_request)
              base_sha="${PR_BASE_SHA}"
              head_sha="${PR_HEAD_SHA}"
              ;;
            push)
              base_sha="${PUSH_BEFORE_SHA}"
              head_sha="${CURRENT_SHA}"
              ;;
            *)
              reason="Unknown event type; running full CI."
              ;;
          esac

          echo "Event: ${EVENT_NAME}"
          echo "Base SHA: ${base_sha:-<not applicable>}"
          echo "Head SHA: ${head_sha:-<not applicable>}"

          if [[ "${EVENT_NAME}" == "pull_request" || "${EVENT_NAME}" == "push" ]]; then
            if [[ -z "${base_sha}" || -z "${head_sha}" ]]; then
              reason="A comparison SHA is missing; running full CI."
            elif [[ "${base_sha}" =~ ^0+$ ]]; then
              reason="The comparison base SHA is all zeros; running full CI."
            elif ! git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
              reason="The comparison base commit is unavailable; running full CI."
            elif ! git cat-file -e "${head_sha}^{commit}" 2>/dev/null; then
              reason="The comparison head commit is unavailable; running full CI."
            else
              changed_file_list="$(mktemp)"
              if git diff --name-only -z "${base_sha}" "${head_sha}" > "${changed_file_list}"; then
                changed_count=0
                unknown_path=""

                echo "Changed paths:"
                while IFS= read -r -d '' path; do
                  changed_count=$((changed_count + 1))
                  printf '  %s\n' "${path}"
                  case "${path}" in
                    docs/* | \
                    TODO.md | CHANGELOG.md | CITATION.cff | \
                    SECURITY.md | CODE_OF_CONDUCT.md | GOVERNANCE.md | SUPPORT.md | \
                    .github/ISSUE_TEMPLATE/* | .github/pull_request_template.md)
                      ;;
                    *)
                      if [[ -z "${unknown_path}" ]]; then
                        unknown_path="${path}"
                      fi
                      ;;
                  esac
                done < "${changed_file_list}"

                if [[ "${changed_count}" -eq 0 ]]; then
                  reason="The changed-file set was unexpectedly empty; running full CI."
                elif [[ -n "${unknown_path}" ]]; then
                  reason="Path '${unknown_path}' is outside the documentation-only allowlist."
                else
                  run_expensive=false
                  reason="Every changed path is documentation-only; skipping expensive CI."
                fi
              else
                reason="Changed-file detection failed; running full CI."
              fi
              rm -f "${changed_file_list}"
            fi
          fi

          echo "Decision: run_expensive=${run_expensive}"
          echo "Reason: ${reason}"
          echo "run_expensive=${run_expensive}" >> "${GITHUB_OUTPUT}"
          echo "reason=${reason}" >> "${GITHUB_OUTPUT}"

      - name: Report documentation-only shortcut
        if: steps.scope.outputs.run_expensive == 'false'
        run: |
          echo "CI completed without Python setup or tests."
          echo "${{ steps.scope.outputs.reason }}"

      - name: Set up Python 3.10
        if: steps.scope.outputs.run_expensive == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install development dependencies on Python 3.10
        if: steps.scope.outputs.run_expensive == 'true'
        run: python -m pip install -e ".[dev]"

      - name: Test on Python 3.10
        if: steps.scope.outputs.run_expensive == 'true'
        run: python -m pytest -n 2 --dist=loadfile --durations=20

      - name: Set up Python 3.11
        if: steps.scope.outputs.run_expensive == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package on Python 3.11
        if: steps.scope.outputs.run_expensive == 'true'
        run: python -m pip install -e .

      - name: Check compatibility on Python 3.11
        if: steps.scope.outputs.run_expensive == 'true'
        run: |
          python -m compileall -q openevalgate
          python -c "import openevalgate; from openevalgate.cli import main; assert callable(main)"
          openevalgate validate examples/customer_support_assistant/eval_cases.yaml

      - name: Set up Python 3.12
        if: steps.scope.outputs.run_expensive == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package on Python 3.12
        if: steps.scope.outputs.run_expensive == 'true'
        run: python -m pip install -e .

      - name: Check compatibility on Python 3.12
        if: steps.scope.outputs.run_expensive == 'true'
        run: |
          python -m compileall -q openevalgate
          python -c "import openevalgate; from openevalgate.cli import main; assert callable(main)"
          openevalgate validate examples/customer_support_assistant/eval_cases.yaml

      - name: Set up Python 3.13
        if: steps.scope.outputs.run_expensive == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install development dependencies on Python 3.13
        if: steps.scope.outputs.run_expensive == 'true'
        run: python -m pip install -e ".[dev]"

      - name: Test and compile on Python 3.13
        if: steps.scope.outputs.run_expensive == 'true'
        run: |
          python -m pytest -n 2 --dist=loadfile --durations=20
          python -m compileall -q openevalgate

      - name: Validate canonical examples
        if: steps.scope.outputs.run_expensive == 'true'
        shell: bash
        run: |
          set -euo pipefail
          for example in customer_support_assistant presales_assistant education_assistant; do
            openevalgate validate "examples/${example}/eval_cases.yaml"
            openevalgate check "examples/${example}/"
            openevalgate report "examples/${example}/" --output "/tmp/${example}.md"
            diff -u "examples/${example}/generated_launch_report.md" "/tmp/${example}.md"
          done

      - name: Build distribution artifacts
        if: steps.scope.outputs.run_expensive == 'true'
        run: python -m build
