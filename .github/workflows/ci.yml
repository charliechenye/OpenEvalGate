name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine CI scope
        id: scope
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          run_expensive=true
          reason_code=fail_closed_default
          base_sha=""
          head_sha=""
          comparison_available=false

          check_fallback_whitespace() {
            fallback_base=""
            head_commit="$(git rev-parse HEAD)"
            if git rev-parse --verify origin/main >/dev/null 2>&1; then
              fallback_base="$(git merge-base HEAD origin/main || true)"
            fi

            if [[ -n "${fallback_base}" && "${fallback_base}" != "${head_commit}" ]]; then
              echo "Using merge-base whitespace fallback: ${fallback_base}..HEAD"
              git diff \
                --check \
                --no-renames \
                "${fallback_base}" \
                HEAD
            else
              echo "No non-empty comparison range is available; checking the current commit."
              git show --check --format= HEAD
            fi
          }

          case "${EVENT_NAME}" in
            workflow_dispatch)
              reason_code=workflow_dispatch
              ;;
            pull_request)
              base_sha="${PR_BASE_SHA}"
              head_sha="${PR_HEAD_SHA}"
              ;;
            push)
              base_sha="${PUSH_BEFORE_SHA}"
              head_sha="${CURRENT_SHA}"
              ;;
            *)
              reason_code=unknown_event
              ;;
          esac

          echo "Event: ${EVENT_NAME}"
          echo "Base SHA: ${base_sha:-<not applicable>}"
          echo "Head SHA: ${head_sha:-<not applicable>}"

          if [[ "${EVENT_NAME}" == "pull_request" || "${EVENT_NAME}" == "push" ]]; then
            if [[ -z "${base_sha}" || -z "${head_sha}" ]]; then
              reason_code=missing_comparison_sha
            elif [[ "${base_sha}" =~ ^0+$ ]]; then
              reason_code=zero_base_sha
            elif ! git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
              reason_code=unavailable_base_commit
            elif ! git cat-file -e "${head_sha}^{commit}" 2>/dev/null; then
              reason_code=unavailable_head_commit
            else
              comparison_available=true
            fi
          fi

          if [[ "${comparison_available}" == "true" ]]; then
            git diff \
              --check \
              --no-renames \
              "${base_sha}" \
              "${head_sha}"

            changed_file_list="$(mktemp)"
            if git diff \
              --name-only \
              -z \
              --no-renames \
              "${base_sha}" \
              "${head_sha}" \
              > "${changed_file_list}"
            then
              changed_count=0
              non_allowlisted_path_found=false

              echo "Changed paths:"
              while IFS= read -r -d '' path; do
                changed_count=$((changed_count + 1))
                printf '  %q\n' "${path}"
                case "${path}" in
                  docs/* | \
                  TODO.md | CHANGELOG.md | CITATION.cff | \
                  SECURITY.md | CODE_OF_CONDUCT.md | GOVERNANCE.md | SUPPORT.md | \
                  .github/ISSUE_TEMPLATE/* | .github/pull_request_template.md)
                    ;;
                  *)
                    printf 'Non-allowlisted path requiring full CI: %q\n' "${path}"
                    non_allowlisted_path_found=true
                    ;;
                esac
              done < "${changed_file_list}"

              if [[ "${changed_count}" -eq 0 ]]; then
                reason_code=empty_changed_file_set
              elif [[ "${non_allowlisted_path_found}" == "true" ]]; then
                reason_code=non_allowlisted_path
              else
                run_expensive=false
                reason_code=documentation_only
              fi
            else
              reason_code=changed_file_detection_failed
            fi
            rm -f "${changed_file_list}"
          else
            check_fallback_whitespace
          fi

          case "${reason_code}" in
            workflow_dispatch | \
            unknown_event | \
            missing_comparison_sha | \
            zero_base_sha | \
            unavailable_base_commit | \
            unavailable_head_commit | \
            changed_file_detection_failed | \
            empty_changed_file_set | \
            non_allowlisted_path | \
            documentation_only | \
            fail_closed_default)
              ;;
            *)
              echo "Unexpected reason code; reverting to fail-closed behavior."
              run_expensive=true
              reason_code=fail_closed_default
              ;;
          esac

          echo "Decision: run_expensive=${run_expensive}"
          echo "Reason code: ${reason_code}"
          printf 'run_expensive=%s\n' "${run_expensive}" >> "${GITHUB_OUTPUT}"
          printf 'reason_code=%s\n' "${reason_code}" >> "${GITHUB_OUTPUT}"

      - name: Report documentation-only shortcut
        if: steps.scope.outputs.run_expensive == 'false'
        run: |
          echo "CI completed without Python setup or tests."
          echo "Scope decision: ${{ steps.scope.outputs.reason_code }}"

      - name: Set up Python 3.10
        if: steps.scope.outputs.run_expensive == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install development dependencies on Python 3.10
        if: steps.scope.outputs.run_expensive == 'true'
        run: python -m pip install -e ".[dev]"

      - name: Test on Python 3.10
        if: steps.scope.outputs.run_expensive == 'true'
        run: >-
          python -m pytest
          -n 2
          --dist=loadfile
          --durations=20

      - name: Set up Python 3.11
        if: steps.scope.outputs.run_expensive == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package on Python 3.11
        if: steps.scope.outputs.run_expensive == 'true'
        run: python -m pip install -e .

      - name: Check compatibility on Python 3.11
        if: steps.scope.outputs.run_expensive == 'true'
        run: |
          python -m compileall -q openevalgate
          python -c "import openevalgate; from openevalgate.cli import main; assert callable(main)"
          openevalgate validate examples/customer_support_assistant/eval_cases.yaml

      - name: Set up Python 3.12
        if: steps.scope.outputs.run_expensive == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package on Python 3.12
        if: steps.scope.outputs.run_expensive == 'true'
        run: python -m pip install -e .

      - name: Check compatibility on Python 3.12
        if: steps.scope.outputs.run_expensive == 'true'
        run: |
          python -m compileall -q openevalgate
          python -c "import openevalgate; from openevalgate.cli import main; assert callable(main)"
          openevalgate validate examples/customer_support_assistant/eval_cases.yaml

      - name: Set up Python 3.13
        if: steps.scope.outputs.run_expensive == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install development dependencies on Python 3.13
        if: steps.scope.outputs.run_expensive == 'true'
        run: python -m pip install -e ".[dev]"

      - name: Test and compile on Python 3.13
        if: steps.scope.outputs.run_expensive == 'true'
        run: |
          python -m pytest \
            -n 2 \
            --dist=loadfile \
            --durations=20
          python -m compileall -q openevalgate

      - name: Validate canonical examples
        if: steps.scope.outputs.run_expensive == 'true'
        shell: bash
        run: |
          set -euo pipefail
          for example in customer_support_assistant presales_assistant education_assistant; do
            openevalgate validate "examples/${example}/eval_cases.yaml"
            openevalgate check "examples/${example}/"
            openevalgate report "examples/${example}/" --output "/tmp/${example}.md"
            diff -u "examples/${example}/generated_launch_report.md" "/tmp/${example}.md"
          done

      - name: Build distribution artifacts
        if: steps.scope.outputs.run_expensive == 'true'
        run: |
          rm -rf build dist
          python -m build

      - name: Verify distribution artifact contents
        if: steps.scope.outputs.run_expensive == 'true'
        run: python scripts/verify_distribution_artifacts.py --dist-dir dist

      - name: Smoke-test installed wheel
        if: steps.scope.outputs.run_expensive == 'true'
        shell: bash
        run: |
          set -euo pipefail

          venv_dir="${RUNNER_TEMP}/openevalgate-wheel-venv"
          smoke_dir="${RUNNER_TEMP}/openevalgate-wheel-smoke"
          rm -rf "${venv_dir}" "${smoke_dir}"
          python -m venv "${venv_dir}"

          venv_python="${venv_dir}/bin/python"
          venv_cli="${venv_dir}/bin/openevalgate"
          mapfile -t wheels < <(find "${GITHUB_WORKSPACE}/dist" -maxdepth 1 -type f -name '*.whl' -print)
          if [[ "${#wheels[@]}" -ne 1 ]]; then
            echo "Expected exactly one wheel; found ${#wheels[@]}: ${wheels[*]-}"
            exit 1
          fi
          wheel_path="$(realpath "${wheels[0]}")"
          "${venv_python}" -m pip install "${wheel_path}"

          mkdir -p "${smoke_dir}"
          for example in customer_support_assistant presales_assistant education_assistant; do
            cp -R "${GITHUB_WORKSPACE}/examples/${example}" "${smoke_dir}/${example}"
          done

          cd "${smoke_dir}"
          unset PYTHONPATH
          unset PYTHONHOME
          export PYTHONNOUSERSITE=1
          export GITHUB_WORKSPACE
          export VENV_PYTHON="${venv_python}"
          export VENV_CLI="${venv_cli}"

          "${venv_python}" - <<'PY'
          from importlib.metadata import version
          from pathlib import Path
          import os
          import subprocess
          import sys

          import openevalgate

          workspace = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
          package_path = Path(openevalgate.__file__).resolve()
          assert not package_path.is_relative_to(workspace), package_path

          installed_version = version("openevalgate")
          assert openevalgate.__version__ == installed_version
          assert openevalgate.__version__ != "0+unknown"

          venv_python = Path(os.environ["VENV_PYTHON"]).resolve()
          venv_cli = Path(os.environ["VENV_CLI"]).resolve()
          print(f"Virtual-environment Python: {venv_python}")
          print(f"Installed package path: {package_path}")
          print(f"Installed distribution version: {installed_version}")

          version_result = subprocess.run(
              [str(venv_cli), "--version"],
              check=True,
              capture_output=True,
          )
          expected_output = f"openevalgate {installed_version}\n".encode()
          assert version_result.stdout == expected_output, version_result.stdout
          assert version_result.stderr == b"", version_result.stderr

          for example in (
              "customer_support_assistant",
              "presales_assistant",
              "education_assistant",
          ):
              example_path = Path(example)
              subprocess.run(
                  [str(venv_cli), "validate", str(example_path / "eval_cases.yaml")],
                  check=True,
              )
              subprocess.run(
                  [str(venv_cli), "check", str(example_path)],
                  check=True,
              )
              generated = Path(f"{example}-installed-report.md")
              subprocess.run(
                  [
                      str(venv_cli),
                      "report",
                      str(example_path),
                      "--output",
                      str(generated),
                  ],
                  check=True,
              )
              canonical = example_path / "generated_launch_report.md"
              assert generated.read_bytes() == canonical.read_bytes(), example
          PY

          "${venv_python}" -m pip show openevalgate
          "${venv_python}" -m pip show -f openevalgate
