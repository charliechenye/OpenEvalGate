name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scope:
    name: Determine CI scope
    runs-on: ubuntu-latest
    outputs:
      run_expensive: ${{ steps.scope.outputs.run_expensive }}
      reason_code: ${{ steps.scope.outputs.reason_code }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine whether the full matrix is required
        id: scope
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          run_expensive=true
          reason_code=fail_closed_default
          base_sha=""
          head_sha=""
          comparison_available=false

          check_fallback_whitespace() {
            local fallback_base=""
            local head_commit
            head_commit="$(git rev-parse HEAD)"
            if git rev-parse --verify origin/main >/dev/null 2>&1; then
              fallback_base="$(git merge-base HEAD origin/main || true)"
            fi

            if [[ -n "${fallback_base}" && "${fallback_base}" != "${head_commit}" ]]; then
              git diff --check --no-renames "${fallback_base}" HEAD
            else
              git show --check --format= HEAD
            fi
          }

          case "${EVENT_NAME}" in
            workflow_dispatch)
              reason_code=workflow_dispatch
              ;;
            pull_request)
              base_sha="${PR_BASE_SHA}"
              head_sha="${PR_HEAD_SHA}"
              ;;
            push)
              base_sha="${PUSH_BEFORE_SHA}"
              head_sha="${CURRENT_SHA}"
              ;;
            *)
              reason_code=unknown_event
              ;;
          esac

          if [[ "${EVENT_NAME}" == "pull_request" || "${EVENT_NAME}" == "push" ]]; then
            if [[ -z "${base_sha}" || -z "${head_sha}" ]]; then
              reason_code=missing_comparison_sha
            elif [[ "${base_sha}" =~ ^0+$ ]]; then
              reason_code=zero_base_sha
            elif ! git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
              reason_code=unavailable_base_commit
            elif ! git cat-file -e "${head_sha}^{commit}" 2>/dev/null; then
              reason_code=unavailable_head_commit
            else
              comparison_available=true
            fi
          fi

          if [[ "${comparison_available}" == "true" ]]; then
            git diff --check --no-renames "${base_sha}" "${head_sha}"
            changed_file_list="$(mktemp)"
            if git diff --name-only -z --no-renames "${base_sha}" "${head_sha}" > "${changed_file_list}"; then
              changed_count=0
              non_allowlisted_path_found=false
              while IFS= read -r -d '' path; do
                changed_count=$((changed_count + 1))
                case "${path}" in
                  docs/* | \
                  AGENTS.md | TODO.md | CHANGELOG.md | CITATION.cff | \
                  SECURITY.md | CODE_OF_CONDUCT.md | GOVERNANCE.md | SUPPORT.md | \
                  AUTHORS.md | CONTRIBUTING.md | README.md | \
                  .github/CODEOWNERS | .github/ISSUE_TEMPLATE/* | \
                  .github/pull_request_template.md)
                    ;;
                  *)
                    non_allowlisted_path_found=true
                    ;;
                esac
              done < "${changed_file_list}"

              if [[ "${changed_count}" -eq 0 ]]; then
                reason_code=empty_changed_file_set
              elif [[ "${non_allowlisted_path_found}" == "true" ]]; then
                reason_code=non_allowlisted_path
              else
                run_expensive=false
                reason_code=documentation_only
              fi
            else
              reason_code=changed_file_detection_failed
            fi
            rm -f "${changed_file_list}"
          else
            check_fallback_whitespace
          fi

          printf 'run_expensive=%s\n' "${run_expensive}" >> "${GITHUB_OUTPUT}"
          printf 'reason_code=%s\n' "${reason_code}" >> "${GITHUB_OUTPUT}"

  docs:
    name: Documentation links
    needs: scope
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate Markdown links
        run: python scripts/check_markdown_links.py

  full_tests:
    name: Full pytest (Python ${{ matrix.python-version }})
    needs: scope
    if: needs.scope.outputs.run_expensive == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run full test suite
        run: >-
          python -m pytest
          -n 4
          --dist=load
          --maxschedchunk=1
          --durations=20
          --durations-min=1.0

  compatibility:
    name: Compatibility smoke (Python ${{ matrix.python-version }})
    needs: scope
    if: needs.scope.outputs.run_expensive == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.14"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e .

      - name: Run compatibility smoke checks
        run: |
          python -m compileall -q openevalgate
          python -c "import openevalgate; from openevalgate.cli import main; assert callable(main)"
          openevalgate validate examples/customer_support_assistant/eval_cases.yaml

  quality_package:
    name: Quality and package
    needs: scope
    if: needs.scope.outputs.run_expensive == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python 3.13
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install development dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run quality and security checks
        run: |
          ruff check openevalgate scripts
          ruff format --check openevalgate scripts
          mypy --follow-imports=skip openevalgate/cli.py scripts
          bandit -q -r openevalgate -ll
          pip-audit
          python -m compileall -q openevalgate

      - name: Validate canonical examples
        shell: bash
        run: |
          set -euo pipefail
          for example in subscription_support_assistant customer_support_assistant presales_assistant education_assistant; do
            openevalgate validate "examples/${example}/eval_cases.yaml"
            openevalgate check "examples/${example}/"
            openevalgate report "examples/${example}/" --output "/tmp/${example}.md"
            diff -u "examples/${example}/generated_launch_report.md" "/tmp/${example}.md"
          done

      - name: Build distribution artifacts
        run: |
          rm -rf build dist
          python -m build

      - name: Verify distribution artifact contents
        run: python scripts/verify_distribution_artifacts.py --dist-dir dist

      - name: Smoke-test installed wheel
        shell: bash
        run: |
          set -euo pipefail
          venv_dir="${RUNNER_TEMP}/openevalgate-wheel-venv"
          smoke_dir="${RUNNER_TEMP}/openevalgate-wheel-smoke"
          rm -rf "${venv_dir}" "${smoke_dir}"
          python -m venv "${venv_dir}"
          venv_python="${venv_dir}/bin/python"
          venv_cli="${venv_dir}/bin/openevalgate"
          mapfile -t wheels < <(find "${GITHUB_WORKSPACE}/dist" -maxdepth 1 -type f -name '*.whl' -print)
          if [[ "${#wheels[@]}" -ne 1 ]]; then
            echo "Expected exactly one wheel; found ${#wheels[@]}: ${wheels[*]-}"
            exit 1
          fi
          "${venv_python}" -m pip install "$(realpath "${wheels[0]}")"
          mkdir -p "${smoke_dir}"
          for example in subscription_support_assistant customer_support_assistant presales_assistant education_assistant; do
            cp -R "${GITHUB_WORKSPACE}/examples/${example}" "${smoke_dir}/${example}"
          done
          cd "${smoke_dir}"
          unset PYTHONPATH PYTHONHOME
          export PYTHONNOUSERSITE=1
          export GITHUB_WORKSPACE
          export VENV_PYTHON="${venv_python}"
          export VENV_CLI="${venv_cli}"
          "${venv_python}" - <<'PY'
          from importlib.metadata import version
          from pathlib import Path
          import os
          import subprocess
          import openevalgate

          workspace = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
          package_path = Path(openevalgate.__file__).resolve()
          assert not package_path.is_relative_to(workspace), package_path
          installed_version = version("openevalgate")
          assert openevalgate.__version__ == installed_version
          assert openevalgate.__version__ != "0+unknown"
          cli = os.environ["VENV_CLI"]
          result = subprocess.run([cli, "--version"], check=True, capture_output=True)
          assert result.stdout == f"openevalgate {installed_version}\n".encode()
          for example in ("subscription_support_assistant", "customer_support_assistant", "presales_assistant", "education_assistant"):
              root = Path(example)
              subprocess.run([cli, "validate", str(root / "eval_cases.yaml")], check=True)
              subprocess.run([cli, "check", str(root)], check=True)
              output = Path(os.environ["RUNNER_TEMP"]) / f"{example}-wheel-report.md"
              subprocess.run([cli, "report", str(root), "--output", str(output)], check=True)
              assert output.read_bytes() == (root / "generated_launch_report.md").read_bytes()
          PY

  CI:
    name: CI
    if: always()
    needs:
      - scope
      - docs
      - full_tests
      - compatibility
      - quality_package
    runs-on: ubuntu-latest
    steps:
      - name: Fail if a required CI job failed
        shell: bash
        env:
          SCOPE_RESULT: ${{ needs.scope.result }}
          DOCS_RESULT: ${{ needs.docs.result }}
          TEST_RESULT: ${{ needs.full_tests.result }}
          COMPATIBILITY_RESULT: ${{ needs.compatibility.result }}
          QUALITY_RESULT: ${{ needs.quality_package.result }}
        run: |
          set -euo pipefail
          for result in "${SCOPE_RESULT}" "${DOCS_RESULT}" "${TEST_RESULT}" "${COMPATIBILITY_RESULT}" "${QUALITY_RESULT}"; do
            if [[ "${result}" == "failure" || "${result}" == "cancelled" ]]; then
              echo "A required CI job returned ${result}."
              exit 1
            fi
          done
          echo "All required CI jobs passed or were intentionally skipped."
