name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Test on Python 3.10
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pytest

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Test on Python 3.11
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pytest

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Test on Python 3.12
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pytest

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install development dependencies on Python 3.13
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Test on Python 3.13
        run: python -m pytest

      - name: Compile package
        run: python -m compileall -q openevalgate

      - name: Validate canonical examples
        shell: bash
        run: |
          set -euo pipefail
          for example in customer_support_assistant presales_assistant education_assistant; do
            openevalgate validate "examples/${example}/eval_cases.yaml"
            openevalgate check "examples/${example}/"
            openevalgate report "examples/${example}/" --output "/tmp/${example}.md"
            diff -u "examples/${example}/generated_launch_report.md" "/tmp/${example}.md"
          done

      - name: Build distribution artifacts
        run: python -m build

      - name: Check whitespace errors
        run: git diff --check
